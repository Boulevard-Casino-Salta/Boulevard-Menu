<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulevard Casino - Bienvenidos</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
      body {
        margin: 0; padding: 0;
        background-color: #121212;
        color: #ffffff;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        height: 100vh; overflow: hidden;
      }

      .contenedor-bienvenida {
        text-align: center;
        width: 100%; max-width: 400px;
        padding: 20px;
        display: flex; flex-direction: column; align-items: center;
      }

      /* El visor gráfico optimizado sin recuadros extra */
      model-viewer {
        width: 280px;
        height: 280px;
        margin-bottom: 20px;
        --poster-color: transparent;
        outline: none; /* Elimina el borde de selección azul/blanco */
      }

      /* Truco CSS para ocultar cualquier botón de RA por defecto o recuadro fantasma */
      model-viewer::part(default-ar-button) {
        display: none;
      }

      /* Quitamos cualquier recuadro blanco de enfoque en dispositivos móviles */
      *:focus {
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      h1 {
        color: #d4af37;
        font-size: 2.2rem;
        letter-spacing: 3px;
        margin: 0 0 5px 0;
        text-shadow: 0px 2px 10px rgba(212, 175, 55, 0.3);
      }

      p {
        color: #888888;
        font-size: 1rem;
        margin: 0;
        font-style: italic;
      }
    </style>
  </head>
  
  <body>

    <div class="contenedor-bienvenida">
      <model-viewer 
        src="Clover.glb" 
        camera-controls 
        autoplay 
        auto-rotate 
        shadow-intensity="1"
        environment-image="neutral">
      </model-viewer>
      
      <h1>BOULEVARD</h1>
      <p>Cargando menú digital...</p>
    </div>

    <script>
      // 7 segundos limpios para que interactúen con el trébol y salte a la carta
      setTimeout(function() {
        window.location.href = "menu.html"; 
      }, 7000);
    </script>

  </body>
</html>
