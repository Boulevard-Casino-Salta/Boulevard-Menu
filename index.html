<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulevard Casino - Bienvenidos</title>
    
    <style>
      /* Fondo elegante oscuro como el casino */
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #ffffff;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* Contenedor principal animado */
      .contenedor-bienvenida {
        text-align: center;
        padding: 20px;
      }

      /* Título dorado brillante */
      h1 {
        color: #d4af37;
        font-size: 2.5rem;
        letter-spacing: 3px;
        margin-bottom: 10px;
        text-shadow: 0px 2px 10px rgba(212, 175, 55, 0.3);
      }

      p {
        color: #a0a0a0;
        font-size: 1.1rem;
        margin-bottom: 30px;
      }

      /* Animación de carga circular (Spinner) en dorado */
      .loader {
        border: 4px solid #2a2a2a;
        border-top: 4px solid #d4af37;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  
  <body>

    <div class="contenedor-bienvenida">
      <h1>BOULEVARD</h1>
      <p>Cargando menú digital...</p>
      
      <div class="loader"></div>
    </div>

    <script>
      // Temporizador puro en JavaScript
      // Espera exactamente 4 segundos (4000 milisegundos) y redirige
      setTimeout(function() {
        window.location.href = "menu.html"; 
      }, 4000);
    </script>

  </body>
</html>
