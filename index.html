<!DOCTYPE html>
<html>
  <head>
    <title>Boulevard Casino - Experiencia RA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true; logDepthBuffer: true;">
      
      <a-assets>
        <a-asset-item id="cuaderno" src="Menu.glb" response-type="arraybuffer"></a-asset-item>
      </a-assets>

      <a-marker type="preset" preset="hiro">
        
        <a-entity 
          gltf-model="#cuaderno" 
          position="0 0.1 0" 
          scale="0.03 0.03 0.03"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-entity>

        <a-text 
          value="BIENVENIDO A BOULEVARD\nCargando la carta..." 
          position="0 1.2 0" 
          color="#FFD700"
          width="4"
          align="center">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Mantenemos el temporizador en 10 segundos (10000ms) para que te dé tiempo de probarlo.
      // Si logramos ver el modelo, después bajamos este tiempo a 4 segundos.
      setTimeout(function() {
        window.location.href = "menu.html"; 
      }, 10000);
    </script>

  </body>
</html>
