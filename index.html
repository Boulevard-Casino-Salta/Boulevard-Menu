<!DOCTYPE html>
<html>
  <head>
    <title>Boulevard Casino - Experiencia RA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="cuaderno" src="Menu.glb"></a-asset-item>
      </a-assets>

      <a-marker type="preset" preset="hiro">
        
        <a-entity 
          gltf-model="#cuaderno" 
          position="0 0.2 0" 
          scale="0.05 0.05 0.05"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-entity>

        <a-text 
          value="BIENVENIDO A BOULEVARD\nCargando la carta..." 
          position="0 1.5 0" 
          color="#FFD700"
          width="4"
          align="center">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Temporizador directo: a los 5 segundos (5000ms) redirige a la lista de precios
      setTimeout(function() {
        window.location.href = "menu.html"; 
      }, 5000);
    </script>

  </body>
</html>
