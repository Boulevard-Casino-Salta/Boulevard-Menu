<!DOCTYPE html>
<html>
  <head>
    <title>Boulevard Casino - Experiencia RA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* Estilos para la pantalla de bienvenida previa a la cámara */
      #pantalla-inicio {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #1a1a1a;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
      }
      .boton-dorado {
        background-color: #d4af37;
        color: #1a1a1a;
        border: none;
        padding: 15px 30px;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        margin-top: 20px;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="pantalla-inicio">
      <h1 style="color: #d4af37; margin-bottom: 5px;">BOULEVARD CASINO</h1>
      <p style="font-size: 0.9rem; color: #888;">Experiencia 3D Interactiva</p>
      <button class="boton-dorado" onclick="iniciarExperiencia()">VER MENÚ EN 3D</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" style="display: none;">
      
      <a-assets>
        <a-asset-item id="ficha" src="Menu.glb"></a-asset-item>
      </a-assets>

      <a-marker type="preset" preset="hiro">
        
        <a-entity 
          gltf-model="#ficha" 
          position="0 0.3 0" 
          scale="2 2 2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-entity>

        <a-text 
          value="BIENVENIDO A BOULEVARD\nCargando platos..." 
          position="0 1.8 0" 
          color="#FFD700"
          width="4"
          align="center">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function iniciarExperiencia() {
        // 1. Ocultamos la pantalla de carga y mostramos la escena de la cámara
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.querySelector('a-scene').style.display = 'block';
        
        // 2. Recién cuando el usuario interactúa, arranca el reloj de 5 segundos para redirigir
        setTimeout(function() {
          window.location.href = "menu.html"; 
        }, 5000);
      }
    </script>

  </body>
</html>
