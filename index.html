<!DOCTYPE html>
<html>
  <head>
    <title>Boulevard Casino - Intro 3D</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="trebol" src="Clover.glb"></a-asset-item>
      </a-assets>

      <a-marker type="preset" preset="hiro">
        
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <a-entity 
          gltf-model="#trebol" 
          position="0 0.3 0" 
          scale="0.5 0.5 0.5"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        </a-entity>

        <a-text 
          value="BIENVENIDO A BOULEVARD\nCargando la carta..." 
          position="0 1.5 0" 
          color="#FFD700"
          width="4"
          align="center">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // 6 segundos de animación antes de pasar automáticamente a los precios
      setTimeout(function() {
        window.location.href = "menu.html"; 
      }, 6000);
    </script>

  </body>
</html>
